# ==========================================================
# 宠物饮食助手 - Nginx 生产配置（本机测试 + 部署通用）
# ----------------------------------------------------------
# 路由策略：
#   /                   -> 前端 SPA (frontend:80)
#   /api/v1/            -> FastAPI (api:8000)  [保留 SSE]
#   /health             -> FastAPI 健康检查
#   /docs, /redoc       -> FastAPI 文档
#   /minio-api/         -> MinIO S3 API (可选, 预签名 URL 走这里)
#
# 本机测试访问：  http://localhost
# 生产环境启用 HTTPS：取消文件底部 443 server 块的注释
# ==========================================================

user  nginx;
worker_processes auto;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ────── 日志 ──────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ────── 基础性能 ──────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;
    client_max_body_size 10M;
    client_body_timeout 60s;

    # ────── Gzip ──────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml application/atom+xml
               font/truetype font/opentype image/svg+xml;

    # ────── 限流 ──────
    limit_req_zone  $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=api_conn:10m;

    # ────── 上游：FastAPI ──────
    upstream fastapi_backend {
        server api:8000;
        keepalive 32;
    }

    # ────── 上游：前端静态 ──────
    upstream frontend_static {
        server frontend:80;
        keepalive 16;
    }

    # ────── 上游：MinIO API（可选）──────
    upstream minio_api {
        server minio:9000;
        keepalive 16;
    }

    # ════════════════════════════════════════════════════════
    # HTTP 站点（本机测试 + 生产初始态）
    # ════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Certbot ACME 校验（签证书时用）
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
            default_type text/plain;
        }

        # ───── 健康检查 ─────
        location = /health {
            proxy_pass http://fastapi_backend/health;
            access_log off;
        }

        # ───── API（含 SSE 流式）─────
        # ^~ 让前缀匹配优先于正则匹配，避免 /api/*.jpg 被静态资源正则劫持到前端
        location ^~ /api/ {
            limit_req  zone=api_limit burst=50 nodelay;
            limit_conn api_conn 20;

            proxy_pass http://fastapi_backend;
            proxy_http_version 1.1;

            # 反代头
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $server_name;

            # SSE 必需：关缓存、长读超时
            proxy_buffering off;
            proxy_cache off;
            proxy_request_buffering off;
            proxy_set_header Connection '';
            proxy_set_header Cache-Control 'no-cache';
            chunked_transfer_encoding on;

            # 超时（与 TASK_TIMEOUT_SECONDS 协调，计划生成最长 ~10 分钟）
            proxy_connect_timeout 60s;
            proxy_send_timeout    600s;
            proxy_read_timeout    600s;

            # WebSocket（未来若启用）
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ───── FastAPI 文档 ─────
        location ~ ^/(docs|redoc|openapi\.json) {
            proxy_pass http://fastapi_backend;
            proxy_set_header Host $host;
            proxy_buffering off;
        }

        # ───── MinIO S3 API 代理（给预签名 URL 用）─────
        # 生产环境若前端直连 MinIO，需在 .env 设置
        #   MINIO_PUBLIC_ENDPOINT=https://your-domain/minio-api
        # 并确保 MinIO 容器的 MINIO_SERVER_URL 也指向同一个地址
        # ^~ 同样防止对象 key 以 .jpg 结尾时被静态资源正则劫持
        location ^~ /minio-api/ {
            rewrite ^/minio-api/(.*)$ /$1 break;
            proxy_pass http://minio_api;
            proxy_http_version 1.1;
            proxy_set_header Host            $host;
            proxy_set_header X-Real-IP       $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 30s;
            proxy_send_timeout    120s;
            proxy_read_timeout    120s;
            client_max_body_size  20M;
            proxy_buffering off;
        }

        # ───── 前端 SPA（兜底，含静态资源）─────
        # 前端容器内部 nginx 已处理静态资源缓存头（expires 30d），
        # 外层只做分流，保持职责单一（SOLID-SRP / DRY）。
        location / {
            proxy_pass http://frontend_static;
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection        "";
        }
    }

    # ════════════════════════════════════════════════════════
    # HTTPS 站点（上线后启用）
    # 签证书：Let's Encrypt + certbot webroot /var/www/certbot
    # ════════════════════════════════════════════════════════
    # server {
    #     listen 443 ssl http2;
    #     server_name your-domain.com;
    #
    #     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols       TLSv1.2 TLSv1.3;
    #     ssl_ciphers         HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #     ssl_session_cache   shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #
    #     add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    #
    #     # 其余 location 配置与 80 端口完全一致，可 include 共享文件
    # }
}
