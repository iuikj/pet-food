name: Build Android APK

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '24'

permissions:
  contents: write  # 允许创建 Release 和上传文件

jobs:
  build-apk:
    runs-on: ubuntu-latest
    environment: pet-food

    steps:
      - name: Checkout frontend repository
        uses: actions/checkout@v4
        with:
          repository: iuikj/pet-food-frontend
          ref: ${{ github.ref_name || inputs.version }}
          path: frontend
          token: ${{ secrets.FRONTEND_REPOSITORY_TOKEN != '' && secrets.FRONTEND_REPOSITORY_TOKEN || github.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/web-app/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Verify Java version
        run: |
          echo "Java version:"
          java -version
          echo "JAVA_HOME: $JAVA_HOME"

      - name: Install dependencies
        working-directory: frontend/web-app
        run: npm ci

      - name: Build web app
        working-directory: frontend/web-app
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'http://81.71.128.32/api/v1' }}
          VITE_ENABLE_SSE: ${{ vars.VITE_ENABLE_SSE || 'true' }}
          VITE_RECONNECT_DELAY: ${{ vars.VITE_RECONNECT_DELAY || '3000' }}
        run: npm run build

      - name: Add Android platform
        working-directory: frontend/web-app
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: frontend/web-app
        run: npx cap sync android

      - name: Debug - Check aar file
        working-directory: frontend/web-app
        run: |
          echo "Checking for android-js-engine-release.aar..."
          ls -la node_modules/@capacitor/background-runner/android/src/main/libs/ || echo "Directory not found"
          echo "Android rootDir will be: $(pwd)/android"
          echo "Expected aar path: $(pwd)/node_modules/@capacitor/background-runner/android/src/main/libs/android-js-engine-release.aar"
          test -f node_modules/@capacitor/background-runner/android/src/main/libs/android-js-engine-release.aar && echo "✓ File exists" || echo "✗ File NOT found"

      - name: Copy background-runner dependencies
        working-directory: frontend/web-app
        run: |
          mkdir -p android/capacitor-cordova-android-plugins/src/main/libs
          mkdir -p android/app/libs
          cp node_modules/@capacitor/background-runner/android/src/main/libs/android-js-engine-release.aar \
             android/capacitor-cordova-android-plugins/src/main/libs/
          cp node_modules/@capacitor/background-runner/android/src/main/libs/android-js-engine-release.aar \
             android/app/libs/

      - name: Build Android APK (Debug)
        working-directory: frontend/web-app/android
        run: |
          echo "Gradle version:"
          ./gradlew --version
          echo "Building Debug APK..."
          ./gradlew assembleDebug

      - name: Build Android APK (Release)
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: frontend/web-app/android
        env:
          KEYSTORE_FILE: ${{ secrets.ANDROID_KEYSTORE_FILE }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          # 如果有签名配置，构建 Release APK
          if [ -n "$KEYSTORE_FILE" ]; then
            echo "Creating keystore file..."
            echo "$KEYSTORE_FILE" | base64 -d > petfood-release.keystore
            ls -la petfood-release.keystore
            echo "Building Release APK..."
            ./gradlew assembleRelease
          else
            echo "⚠️ No keystore configured, skipping release build"
          fi

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pet-food-debug-${{ github.ref_name || inputs.version }}
          path: frontend/web-app/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: pet-food-release-${{ github.ref_name || inputs.version }}
          path: frontend/web-app/android/app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/web-app/android/app/build/outputs/apk/debug/*.apk
            frontend/web-app/android/app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
